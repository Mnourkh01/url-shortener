spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shortener_db}
    username: ${DB_USERNAME:shortener_user}
    password: ${DB_PASSWORD:shortener_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
