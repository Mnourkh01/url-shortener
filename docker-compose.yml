services:
  postgres:
    image: postgres:16-alpine
    container_name: shortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-shortener_db}
      POSTGRES_USER: ${DB_USERNAME:-shortener_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shortener_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - shortener_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-shortener_user} -d ${DB_NAME:-shortener_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shortener-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  shortener_pgdata:
